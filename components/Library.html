<div id="library-view">

  <header class="flex items-center justify-between px-4 py-3 border-b border-[#1e2e1e] flex-shrink-0 bg-[#0a0f0a]">
    <div class="flex items-center gap-2">
      <svg class="w-5 h-5 text-[#22c55e]" fill="currentColor" viewBox="0 0 20 20">
        <path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"/>
      </svg>
      <div>
        <span class="font-bold text-[#f0fdf4] text-base">JamMate</span>
        <a href="https://github.com/esterlinpol/JamMate" target="_blank" rel="noopener"
          class="block text-[0.6rem] text-[#86efac] opacity-40 hover:opacity-70 leading-none mt-0.5 transition-opacity">
          by esterlinpol
        </a>
      </div>
    </div>
    <div class="flex items-center gap-1">
      <button id="btn-refresh" class="p-2 text-[#86efac] hover:text-[#22c55e] transition-colors" title="Refresh">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0114.85-3.15L20 9M4 15l1.15 3.15A9 9 0 0020 15"/>
        </svg>
      </button>
      <button id="btn-chords" class="p-2 text-[#86efac] hover:text-[#22c55e] transition-colors" title="Chord Library">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 9l10.5-3m0 6.553v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 11-.99-3.467l2.31-.66a2.25 2.25 0 001.632-2.163zm0 0V2.25L9 5.25v10.303m0 0v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 01-.99-3.467l2.31-.66A2.25 2.25 0 009 15.553z"/>
        </svg>
      </button>
      <button id="btn-settings" class="p-2 text-[#86efac] hover:text-[#22c55e] transition-colors" title="Settings">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="worker-banner" class="hidden"></div>

  <div class="flex-1 overflow-y-auto">
    <div id="song-grid" class="grid grid-cols-2 gap-3 p-4"></div>
    <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 px-8 text-center">
      <svg class="w-14 h-14 mb-4 text-[#1e2e1e]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
      </svg>
      <p class="font-semibold text-[#86efac] mb-1">No songs yet</p>
      <p class="text-sm text-[#86efac] opacity-50">Tap the button below to add your first song</p>
    </div>
  </div>

  <div class="flex-shrink-0 px-4 pt-3 border-t border-[#1e2e1e] bg-[#0a0f0a]" style="padding-bottom: max(24px, env(safe-area-inset-bottom))">
    <button id="btn-add"
      class="no-scale w-full py-3.5 rounded-2xl bg-[#22c55e] text-[#0a0f0a] font-bold text-base flex items-center justify-center gap-2 active:bg-[#16a34a]">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      Add Song
    </button>
  </div>

</div>
