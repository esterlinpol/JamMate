<div id="chord-library-view" class="bg-[#0a0f0a] flex flex-col h-full" style="display:none">

  <header class="flex items-center gap-2 px-3 py-3 border-b border-[#1e2e1e] flex-shrink-0">
    <button id="chord-lib-back" class="p-2 text-[#86efac] hover:text-[#22c55e] -ml-1">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    <span class="flex-1 font-bold text-[#f0fdf4]">Chord Library</span>
    <button id="chord-lib-add"
      class="flex items-center gap-1.5 px-3 py-1.5 bg-[#22c55e] text-[#0a0f0a] rounded-xl text-sm font-bold hover:bg-[#16a34a] transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      New Chord
    </button>
  </header>

  <div id="chord-lib-empty" class="hidden flex-1 flex flex-col items-center justify-center gap-3 text-center px-6">
    <svg class="w-12 h-12 text-[#1e2e1e]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 9l10.5-3m0 6.553v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 11-.99-3.467l2.31-.66a2.25 2.25 0 001.632-2.163zm0 0V2.25L9 5.25v10.303m0 0v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 01-.99-3.467l2.31-.66A2.25 2.25 0 009 15.553z"/>
    </svg>
    <p class="text-[#86efac] text-sm opacity-60">No chords yet.<br>Add your first chord.</p>
  </div>

  <div id="chord-lib-grid"
    class="flex-1 overflow-y-auto p-4 grid gap-3 content-start items-start"
    style="grid-template-columns: repeat(auto-fill, minmax(90px, 1fr))">
  </div>

</div>
